name: dip-dev

services:

  postgres:
    image: postgres:18-bookworm
    container_name: dip-dev-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - platform

  redis:
    image: redis:${REDIS_VERSION}-bookworm
    container_name: dip-dev-redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - platform

  minio:
    image: ${MINIO_IMAGE}
    container_name: dip-dev-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s

    networks:
      - platform

  mailpit:
    image: ${MAILPIT_IMAGE}
    container_name: dip-dev-mailpit
    restart: unless-stopped

    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"

    healthcheck:
      test: ["CMD", "/mailpit", "ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - platform

  pgadmin:
    image: ${PGADMIN_IMAGE}
    container_name: dip-dev-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}

    ports:
      - "${PGADMIN_PORT}:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/misc/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - platform
      
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    container_name: dip-dev-keycloak
    restart: unless-stopped

    command:
      - start-dev
      - --health-enabled=true

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

    ports:
      - "${KEYCLOAK_PORT}:8080"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9000'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

    networks:
      - platform


networks:

  platform:
    driver: bridge

volumes:

  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data: